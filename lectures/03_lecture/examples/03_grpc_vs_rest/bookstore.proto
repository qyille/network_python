syntax = "proto3";

package bookstore;

// ─── gRPC-спецификация сервиса книжного магазина ───────────────────────────
// Те же CRUD-операции, что в REST-версии из лекции 2,
// но через protobuf — строгая типизация, компактный бинарный формат.

service Bookstore {
    rpc ListBooks (ListBooksRequest) returns (ListBooksResponse);
    rpc GetBook (GetBookRequest) returns (Book);
    rpc CreateBook (CreateBookRequest) returns (Book);
    rpc UpdateBook (UpdateBookRequest) returns (Book);
    rpc DeleteBook (DeleteBookRequest) returns (DeleteBookResponse);
}

message Book {
    int32 id = 1;
    string title = 2;
    string author = 3;
    int32 year = 4;
    string isbn = 5;
    double price = 6;
}

message ListBooksRequest {
    optional int32 year_filter = 1; 
}

message ListBooksResponse {
    repeated Book books = 1;
}

message GetBookRequest {
    int32 id = 1;
}

message CreateBookRequest {
    string title = 1;
    string author = 2;
    int32 year = 3;
    string isbn = 4;
    double price = 5;
}

message UpdateBookRequest {
    int32 id = 1;
    string title = 2;
    string author = 3;
    int32 year = 4;
    string isbn = 5;
    double price = 6;
}

message DeleteBookRequest {
    int32 id = 1;
}

message DeleteBookResponse {
    bool success = 1;
}
